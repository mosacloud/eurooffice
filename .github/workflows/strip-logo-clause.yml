name: Strip Section 7(b) trademark clause
run-name: "Strip Section 7(b) clause (${{ inputs.project }})"

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to strip (or "all")'
        required: true
        type: choice
        options:
          - all
          - web-apps
          - sdkjs
          - core
          - server
          - DocumentServer
      auto-merge:
        description: 'Trigger auto bot merge'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: self-hosted
    outputs:
      repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - name: Build matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.project }}" = "all" ]; then
            echo 'repos=["web-apps","sdkjs","core","server","DocumentServer"]' >> "$GITHUB_OUTPUT"
          else
            echo 'repos=["${{ inputs.project }}"]' >> "$GITHUB_OUTPUT"
          fi

  strip:
    needs: prepare
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.repos) }}

    env:
      PATTERN: "Pursuant to Section 7(b)"
      BRANCH_NAME: chore/strip-logo-clause-${{ github.run_id }}
      GIT_AUTHOR_NAME: Euro-Office Robot
      GIT_AUTHOR_EMAIL: eo-robot@users.noreply.github.com
      GIT_COMMITTER_NAME: Euro-Office Robot
      GIT_COMMITTER_EMAIL: eo-robot@users.noreply.github.com

    steps:
      - name: Fetch templates
        env:
          GH_TOKEN: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
        run: |
          mkdir -p /tmp/templates
          for f in strip-logo-clause-commit.txt strip-logo-clause-pr-body.txt strip-license-clauses.sh; do
            curl -sfH "Authorization: token $GH_TOKEN" \
              "https://raw.githubusercontent.com/Euro-Office/DocumentServer/main/scripts/$f" \
              -o "/tmp/templates/$f"
          done
          chmod +x /tmp/templates/strip-license-clauses.sh

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: Euro-Office/${{ matrix.repo }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          ref: main

      - name: Check for clause
        id: check
        run: |
          count=$(grep -rl "$PATTERN" . \
            --include="*.js" --include="*.less" --include="*.css" \
            --include="*.html" --include="*.htm" --include="*.py" \
            --include="*.sh" --include="*.json" --include="*.ts" \
            --include="*.cpp" --include="*.h" --include="*.c" \
            2>/dev/null | wc -l | tr -d ' ')

          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "No files contain the clause in ${{ matrix.repo }}. Skipping."
          fi

      - name: Strip clause
        id: strip
        if: steps.check.outputs.count != '0'
        run: /tmp/templates/strip-license-clauses.sh . ${{ matrix.repo }}

      - name: Create branch and commit
        if: steps.check.outputs.count != '0' && steps.strip.outcome == 'success'
        id: commit
        run: |
          git checkout -b "$BRANCH_NAME"
          git add -u
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -F /tmp/templates/strip-logo-clause-commit.txt
          git push origin "$BRANCH_NAME"

      - name: Create pull request
        if: steps.strip.outcome == 'success' && steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
        run: |
          sed 's/__COUNT__/${{ steps.check.outputs.count }}/g' /tmp/templates/strip-logo-clause-pr-body.txt > /tmp/pr-body.txt
          PR_URL=$(gh pr create \
            --repo "Euro-Office/${{ matrix.repo }}" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore(license): Remove non-obligatory Section 7 additions" \
            --body-file /tmp/pr-body.txt)

          echo "PR created: $PR_URL"

          if [ "${{ inputs.auto-merge }}" = "true" ]; then
            gh pr merge "$PR_URL" --merge --delete-branch
          fi
