name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:
    inputs:
      core_branch:
        description: 'Branch core'
        required: false
        default: ''
        type: string
      sdkjs_branch:
        description: 'Branch for sdkjs'
        required: false
        default: ''
        type: string
      web_apps_branch:
        description: 'Branch for web-apps'
        required: false
        default: ''
        type: string
      server_branch:
        description: 'Branch for server'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: euro-office/documentserver
  CACHE_IMAGE_NAME: euro-office/documentserver-build-cache
  PRODUCT_VERSION: 9.2.1
  BUILD_ROOT: /package

jobs:
  clone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository (with submodules)
        uses: actions/checkout@v6
        with:
          path: .
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Align submodules to requested branches
        shell: bash
        env:
          CORE_BRANCH:    ${{ github.event.inputs.core_branch || '' }}
          SDKJS_BRANCH:   ${{ github.event.inputs.sdkjs_branch || '' }}
          WEBAPPS_BRANCH: ${{ github.event.inputs.web_apps_branch || '' }}
          SERVER_BRANCH:  ${{ github.event.inputs.server_branch || '' }}
        run: |
          set -euo pipefail

          # Helper that checks out a branch inside a submodule
          checkout_submodule() {
            local path=$1
            local branch=$2
            echo "🔧 Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin "${branch}:${branch}"   # ensure the branch exists locally
            git checkout "$branch"
            popd > /dev/null
          }

          # Only override if explicitly requested via workflow_dispatch.
          # On a normal PR push, use whatever commit the parent repo has pinned —
          # this is the correct behaviour: the submodule SHA in fork IS the source
          # of truth for which core commit to build.
          [ -n "$CORE_BRANCH" ]    && checkout_submodule core      "$CORE_BRANCH"
          [ -n "$SDKJS_BRANCH" ]   && checkout_submodule sdkjs     "$SDKJS_BRANCH"
          [ -n "$WEBAPPS_BRANCH" ] && checkout_submodule web-apps  "$WEBAPPS_BRANCH"
          [ -n "$SERVER_BRANCH" ]  && checkout_submodule server    "$SERVER_BRANCH"

          # These always track main, no pin needed
          checkout_submodule dictionaries       "main"
          checkout_submodule document-templates "main"

          echo "--- Submodule state after alignment ---"
          git submodule status

      - name: Cache clones
        uses: actions/cache@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

  build:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: clone
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - core
          - core-wasm
          - web-apps
          - server
        arch:
          - amd64
          - arm64

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build Docker image (intermediate stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: ${{ matrix.target }}
          push: false
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-${{ matrix.target }}-${{ matrix.arch }},mode=max

  build-sdkjs:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build Docker image (intermediate stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: sdkjs
          push: false
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-core-wasm-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-sdkjs-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-sdkjs-${{ matrix.arch }},mode=max

  combine:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: build-sdkjs
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (arch-specific)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: finalubuntu
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.name }}-${{ matrix.arch }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-core-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-sdkjs-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-web-apps-${{ matrix.arch }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-server-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-final-${{ matrix.arch }},mode=max

  manifest:
    runs-on: ubuntu-latest
    needs: combine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          REF="${{ steps.ref.outputs.name }}"
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          create_manifest() {
            local tag="$1"
            docker buildx imagetools create \
              -t "${REPO}:${tag}" \
              "${REPO}:${REF}-amd64" \
              "${REPO}:${REF}-arm64"
          }

          # Always push the branch/ref name tag
          create_manifest "${REF}"

          # Push :nightly on the default branch
          if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
            create_manifest "nightly"
          fi

          # Push :latest on git tags
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            create_manifest "latest"
          fi

  build-develop:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: combine
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (arch-specific dev)
        if: github.ref_name == github.event.repository.default_branch
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: develop
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-dev-${{ matrix.arch }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-final-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-dev-${{ matrix.arch }},mode=max

  manifest-develop:
    runs-on: ubuntu-latest
    needs: build-develop
    if: github.ref_name == github.event.repository.default_branch
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch dev manifest
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            -t "${REPO}:latest-dev" \
            "${REPO}:latest-dev-amd64" \
            "${REPO}:latest-dev-arm64"

  e2e:
    runs-on: ubuntu-latest
    needs: manifest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Pull built image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        env:
          E2E_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.name }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 14

  build-packages:
    runs-on: ubuntu-latest
    needs: combine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build packages (.deb and .rpm)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: packages
          outputs: type=local,dest=./packages-output
          push: false
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-core-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-sdkjs-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-web-apps-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-server-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.ref.outputs.name }}-final-amd64

      #- name: Upload packages as artifact
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: packages-${{ github.sha }}
      #    path: packages-output/
      #    retention-days: 30
