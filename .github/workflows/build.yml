name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:
    inputs:
      core_branch:
        description: 'Branch core'
        required: false
        default: ''
        type: string
      sdkjs_branch:
        description: 'Branch for sdkjs'
        required: false
        default: ''
        type: string
      web_apps_branch:
        description: 'Branch for web-apps'
        required: false
        default: ''
        type: string
      server_branch:
        description: 'Branch for server'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io/euro-office
  IMAGE_NAME: documentserver
  CLUSTER_IMG_DOCS: cluster-docs
  CLUSTER_IMG_EXAMPLE: cluster-example
  CLUSTER_IMG_UTILS: cluster-utils
  CACHE_IMAGE_NAME: documentserver-build-cache
  PRODUCT_VERSION: 9.3.1
  BUILD_NUMBER: dev.1
  BUILD_ROOT: /package
  # Branded image names (nextcloud-office)
  NEXTCLOUD_IMAGE_NAME: nextcloud-office-documentserver
  NEXTCLOUD_CLUSTER_IMG_DOCS: nextcloud-office-cluster-docs
  NEXTCLOUD_CLUSTER_IMG_EXAMPLE: nextcloud-office-cluster-example
  NEXTCLOUD_CLUSTER_IMG_UTILS: nextcloud-office-cluster-utils

jobs:
  clone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: .
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Checkout nextcloud-office-brand repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Euro-Office/nextcloud-office-brand
          path: build/brands/nextcloud-office-brand
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Align submodules to requested branches
        shell: bash
        env:
          CORE_BRANCH:    ${{ github.event.inputs.core_branch || '' }}
          SDKJS_BRANCH:   ${{ github.event.inputs.sdkjs_branch || '' }}
          WEBAPPS_BRANCH: ${{ github.event.inputs.web_apps_branch || '' }}
          SERVER_BRANCH:  ${{ github.event.inputs.server_branch || '' }}
        run: |
          set -euo pipefail

          checkout_submodule() {
            local path=$1
            local branch=$2
            echo "🔧 Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin "${branch}:${branch}"
            git checkout "$branch"
            popd > /dev/null
          }

          [ -n "$CORE_BRANCH" ]    && checkout_submodule core      "$CORE_BRANCH"
          [ -n "$SDKJS_BRANCH" ]   && checkout_submodule sdkjs     "$SDKJS_BRANCH"
          [ -n "$WEBAPPS_BRANCH" ] && checkout_submodule web-apps  "$WEBAPPS_BRANCH"
          [ -n "$SERVER_BRANCH" ]  && checkout_submodule server    "$SERVER_BRANCH"

          checkout_submodule dictionaries       "main"
          checkout_submodule document-templates "main"

          echo "--- Submodule state after alignment ---"
          git submodule status

      - name: Cache clones
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────
  # BUILD
  #
  # Single job that builds the full target graph in one bake
  # invocation per arch × brand. Because develop depends on
  # docker which depends on packages, bake resolves the shared
  # graph and never rebuilds a layer twice.
  #
  # Pushing per target:
  #   docker   → pushed on default branch (:nightly) and git tags (:latest)
  #   develop  → pushed on default branch only (:latest-dev)
  #   packages → never pushed; exported to local filesystem for release upload
  #              (euro-office → GitHub Release, nextcloud-office → SSH)
  # ─────────────────────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: clone
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
        brand:
          - name: euro-office
            image_name: documentserver
            cluster_docs: cluster-docs
            cluster_example: cluster-example
            cluster_utils: cluster-utils
            extra_bake_files: ""
            extra_targets: ""
            cache_prefix: ""
          - name: nextcloud-office
            image_name: nextcloud-office-documentserver
            cluster_docs: nextcloud-office-cluster-docs
            cluster_example: nextcloud-office-cluster-example
            cluster_utils: nextcloud-office-cluster-utils
            extra_bake_files: "./brands/nextcloud-office-brand/brand-server.hcl"
            extra_targets: "brand-icons,"
            cache_prefix: "nextcloud-office-"

    steps:
      - name: Restore cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and push flags
        id: meta
        run: |
          REF_NAME=$(echo '${{ github.ref_name }}' | tr '/' '-')
          echo "ref_name=${REF_NAME}" >> $GITHUB_OUTPUT

          IS_DEFAULT=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/') }}

          # docker target: push on default branch and git tags
          if [[ "$IS_DEFAULT" == "true" ]]; then
            echo "images_tag=nightly-${{ matrix.arch }}"  >> $GITHUB_OUTPUT
            echo "images_push=true"                       >> $GITHUB_OUTPUT
          elif [[ "$IS_TAG" == "true" ]]; then
            echo "images_tag=latest-${{ matrix.arch }}"   >> $GITHUB_OUTPUT
            echo "images_push=true"                       >> $GITHUB_OUTPUT
          else
            echo "images_tag=${REF_NAME}-${{ matrix.arch }}" >> $GITHUB_OUTPUT
            echo "images_push=false"                         >> $GITHUB_OUTPUT
          fi

          # develop target: push on default branch only
          if [[ "$IS_DEFAULT" == "true" ]]; then
            echo "develop_push=true"  >> $GITHUB_OUTPUT
          else
            echo "develop_push=false" >> $GITHUB_OUTPUT
          fi

          # nextcloud-office images must not be pushed to ghcr.io/euro-office;
          # only its .deb/.rpm packages are shipped (via SSH). Override the
          # flags for that brand (last write to $GITHUB_OUTPUT wins).
          if [[ "${{ matrix.brand.name }}" == "nextcloud-office" ]]; then
            echo "images_push=false"  >> $GITHUB_OUTPUT
            echo "develop_push=false" >> $GITHUB_OUTPUT
          fi

          # Parse PRODUCT_VERSION / BUILD_NUMBER from tag of the form v${PRODUCT_VERSION}-${BUILD_NUMBER}
          # (e.g. v9.3.1-beta.1, v9.3.1-stable.1). Fall back to env defaults otherwise.
          if [[ "$IS_TAG" == "true" && "${{ github.ref_name }}" =~ ^v([^-]+)-(.+)$ ]]; then
            echo "product_version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "build_number=${BASH_REMATCH[2]}"    >> $GITHUB_OUTPUT
          else
            echo "product_version=${{ env.PRODUCT_VERSION }}" >> $GITHUB_OUTPUT
            echo "build_number=${{ env.BUILD_NUMBER }}"       >> $GITHUB_OUTPUT
          fi

      - name: Build all targets (packages → docker → develop)
        uses: docker/bake-action@4a9a8d494466d37134e2bfca2d3a8de8fb2681ad # v5.13.0
        with:
          workdir: ./build
          # For nextcloud-office, brand-server.hcl is appended; empty lines are
          # filtered by bake-action so euro-office sees only the base file.
          files: |
            ./docker-bake.hcl
            ${{ matrix.brand.extra_bake_files }}
          # extra_targets is either "" (euro-office) or "brand-icons," so the
          # comma-joined target list resolves correctly for both.
          targets: ${{ matrix.brand.extra_targets }}packages,standalone,develop,cluster-utils,cluster-example,cluster-docs
          # push=false here; per-target pushing is controlled via tags below.
          # Targets with empty tags= are not pushed regardless of this flag.
          push: false
          set: |
            core.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}core-buildcache-${{ matrix.arch }}
            core.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}core-buildcache-${{ matrix.arch }},mode=max
            core.tags=
            core-wasm.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}core-wasm-buildcache-${{ matrix.arch }}
            core-wasm.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}core-wasm-buildcache-${{ matrix.arch }},mode=max
            core-wasm.tags=
            sdkjs.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}sdkjs-buildcache-${{ matrix.arch }}
            sdkjs.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}sdkjs-buildcache-${{ matrix.arch }},mode=max
            sdkjs.tags=
            web-apps.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}web-apps-buildcache-${{ matrix.arch }}
            web-apps.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}web-apps-buildcache-${{ matrix.arch }},mode=max
            web-apps.tags=
            server.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}server-buildcache-${{ matrix.arch }}
            server.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}server-buildcache-${{ matrix.arch }},mode=max
            server.tags=
            example.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}example-buildcache-${{ matrix.arch }}
            example.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}example-buildcache-${{ matrix.arch }},mode=max
            example.tags=
            bundle.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}bundle-buildcache-${{ matrix.arch }}
            bundle.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}bundle-buildcache-${{ matrix.arch }},mode=max
            bundle.tags=
            packages.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}packages-buildcache-${{ matrix.arch }}
            packages.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}packages-buildcache-${{ matrix.arch }},mode=max
            packages.tags=
            cluster-docs.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-docs-buildcache-${{ matrix.arch }}
            cluster-docs.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-docs-buildcache-${{ matrix.arch }},mode=max
            cluster-docs.tags=${{ steps.meta.outputs.images_push == 'true' && format('{0}/{1}:{2}', env.REGISTRY, matrix.brand.cluster_docs, steps.meta.outputs.images_tag) || '' }}
            cluster-docs.output=${{ steps.meta.outputs.images_push == 'true' && format('type=registry') || 'type=cacheonly' }}
            cluster-example.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-example-buildcache-${{ matrix.arch }}
            cluster-example.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-example-buildcache-${{ matrix.arch }},mode=max
            cluster-example.tags=${{ steps.meta.outputs.images_push == 'true' && format('{0}/{1}:{2}', env.REGISTRY, matrix.brand.cluster_example, steps.meta.outputs.images_tag) || '' }}
            cluster-example.output=${{ steps.meta.outputs.images_push == 'true' && format('type=registry') || 'type=cacheonly' }}
            cluster-utils.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-utils-buildcache-${{ matrix.arch }}
            cluster-utils.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}cluster-utils-buildcache-${{ matrix.arch }},mode=max
            cluster-utils.tags=${{ steps.meta.outputs.images_push == 'true' && format('{0}/{1}:{2}', env.REGISTRY, matrix.brand.cluster_utils, steps.meta.outputs.images_tag) || '' }}
            cluster-utils.output=${{ steps.meta.outputs.images_push == 'true' && format('type=registry') || 'type=cacheonly' }}
            standalone.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}standalone-buildcache-${{ matrix.arch }}
            standalone.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}standalone-buildcache-${{ matrix.arch }},mode=max
            standalone.tags=${{ steps.meta.outputs.images_push == 'true' && format('{0}/{1}:{2}', env.REGISTRY, matrix.brand.image_name, steps.meta.outputs.images_tag) || '' }}
            standalone.output=${{ steps.meta.outputs.images_push == 'true' && format('type=registry') || 'type=cacheonly' }}
            develop.cache-from=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}develop-buildcache-${{ matrix.arch }}
            develop.cache-to=type=registry,ref=${{ env.REGISTRY }}/${{ env.CACHE_IMAGE_NAME }}:${{ steps.meta.outputs.ref_name }}-${{ matrix.brand.cache_prefix }}develop-buildcache-${{ matrix.arch }},mode=max
            develop.tags=${{ steps.meta.outputs.develop_push == 'true' && format('{0}/{1}:latest-dev-{2}', env.REGISTRY, matrix.brand.image_name, matrix.arch) || '' }}
            develop.output=${{ steps.meta.outputs.develop_push == 'true' && 'type=registry' || 'type=cacheonly' }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          TAG: ${{ steps.meta.outputs.images_tag }}
          PRODUCT_VERSION: ${{ steps.meta.outputs.product_version }}
          BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          BUILD_ROOT: ${{ env.BUILD_ROOT }}
          NUGET_CACHE: local

      - name: Upload packages to GitHub Release
        uses: softprops/action-gh-release@v2
        if: matrix.brand.name == 'euro-office' && startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/deploy/packages/*.deb
            build/deploy/packages/*.rpm

      - name: Upload packages via SSH (nextcloud-office)
        if: matrix.brand.name == 'nextcloud-office' && startsWith(github.ref, 'refs/tags/')
        env:
          SSH_KEY:         ${{ secrets.NEXTCLOUD_SSH_KEY }}
          SSH_HOST:        ${{ secrets.NEXTCLOUD_SSH_HOST }}
          SSH_USER:        ${{ secrets.NEXTCLOUD_SSH_USER }}
          SSH_PORT:        ${{ secrets.NEXTCLOUD_SSH_PORT || 22 }}
          REMOTE_BASE:     ${{ secrets.NEXTCLOUD_SSH_REMOTE_PATH }}
          PRODUCT_VERSION: ${{ steps.meta.outputs.product_version }}
          BUILD_NUMBER:    ${{ steps.meta.outputs.build_number }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          TARGET="$REMOTE_BASE/$PRODUCT_VERSION/$BUILD_NUMBER"
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$TARGET'"
          scp -i ~/.ssh/id_deploy -P "$SSH_PORT" \
            build/deploy/packages/*.deb build/deploy/packages/*.rpm \
            "$SSH_USER@$SSH_HOST:$TARGET/"

  # ─────────────────────────────────────────────────────────────
  # MANIFEST
  #
  # Merges the arch-specific images into multi-arch manifests for
  # both brands. Runs on default branch (:nightly) and git tags
  # (:latest + sanitised ref tag).
  # ─────────────────────────────────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Compute safe ref name
        id: ref
        run: echo "name=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          REF="${{ steps.ref.outputs.name }}"
          REGISTRY="${{ env.REGISTRY }}"

          create_manifest() {
            local repo="$1"
            local target_tag="$2"
            local source_tag="${3:-$target_tag}"
            docker buildx imagetools create \
              -t "${repo}:${target_tag}" \
              "${repo}:${source_tag}-amd64" \
              "${repo}:${source_tag}-arm64"
          }

          # Repos that follow the standard tagging scheme
          # (nightly on default branch, latest + ref on git tags).
          # documentserver and nextcloud-office-documentserver also get
          # :latest-dev on the default branch via the develop target;
          # the cluster images do not.
          REPOS=(
            "${REGISTRY}/${{ env.IMAGE_NAME }}"
            "${REGISTRY}/${{ env.CLUSTER_IMG_DOCS }}"
            "${REGISTRY}/${{ env.CLUSTER_IMG_EXAMPLE }}"
            "${REGISTRY}/${{ env.CLUSTER_IMG_UTILS }}"
            #"${REGISTRY}/${{ env.NEXTCLOUD_IMAGE_NAME }}"
            #"${REGISTRY}/${{ env.NEXTCLOUD_CLUSTER_IMG_DOCS }}"
            #"${REGISTRY}/${{ env.NEXTCLOUD_CLUSTER_IMG_EXAMPLE }}"
            #"${REGISTRY}/${{ env.NEXTCLOUD_CLUSTER_IMG_UTILS }}"
          )

          if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
            for repo in "${REPOS[@]}"; do
              create_manifest "$repo" "nightly"
            done
            create_manifest "${REGISTRY}/${{ env.IMAGE_NAME }}" "latest-dev"
            #create_manifest "${REGISTRY}/${{ env.NEXTCLOUD_IMAGE_NAME }}" "latest-dev"
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            for repo in "${REPOS[@]}"; do
              create_manifest "$repo" "latest"
              create_manifest "$repo" "${REF}" "latest"
            done
          fi
